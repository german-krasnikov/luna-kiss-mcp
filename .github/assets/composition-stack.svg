<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="1200" height="560" role="img" aria-labelledby="cstack__title cstack__desc">
  <title id="cstack__title">Luna MCP — the 6-layer composition stack</title>
  <desc id="cstack__desc">A telemetry packet descends through six guard layers — Recorder, Hinter, Degradation, Budget gate, Reflect, and Schema guard — before reaching Chrome, each layer earning its place.</desc>
  <defs>
    <linearGradient id="cstack__skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#05060B"/>
      <stop offset="55%" stop-color="#080A14"/>
      <stop offset="100%" stop-color="#0E1120"/>
    </linearGradient>
    <linearGradient id="cstack__accentArc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#39E0FF"/>
      <stop offset="50%" stop-color="#6AB6FF"/>
      <stop offset="100%" stop-color="#8B7DFF"/>
    </linearGradient>
    <linearGradient id="cstack__successBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3FE0A3"/>
      <stop offset="100%" stop-color="#39E0FF"/>
    </linearGradient>
    <radialGradient id="cstack__moonBody" cx="38%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#E8ECF6"/>
      <stop offset="42%" stop-color="#A9B6D9"/>
      <stop offset="78%" stop-color="#3A4360"/>
      <stop offset="100%" stop-color="#10131F"/>
    </radialGradient>
    <filter id="cstack__glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cstack__glowFine" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cstack__halo" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    .lbl   { font-family: "Segoe UI", Helvetica, Arial, sans-serif; }
    .mono  { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .twk   { animation: cstack__tw 2.4s ease-in-out infinite; }
    .twk2  { animation: cstack__tw 2.4s ease-in-out infinite; animation-delay: 1.1s; }
    .pulse { animation: cstack__pulse 3s cubic-bezier(0.4,0,0.2,1) infinite; }
    @keyframes cstack__tw    { 0%,100%{opacity:.30} 50%{opacity:.85} }
    @keyframes cstack__pulse { 0%,100%{opacity:.45} 50%{opacity:1} }
    @media (prefers-reduced-motion: reduce){ * { animation: none !important; } }
  </style>

  <rect width="1200" height="560" fill="url(#cstack__skyGrad)"/>

  <!-- starfield -->
  <g fill="#F4F7FF">
    <circle class="twk"  cx="70"  cy="48"  r="1.1" opacity=".6"/>
    <circle class="twk2" cx="180" cy="92"  r="0.8" opacity=".4"/>
    <circle class="twk"  cx="320" cy="40"  r="1.3" opacity=".7"/>
    <circle class="twk2" cx="470" cy="70"  r="0.7" opacity=".35"/>
    <circle class="twk"  cx="640" cy="36"  r="1.0" opacity=".55"/>
    <circle class="twk2" cx="820" cy="60"  r="0.9" opacity=".45"/>
    <circle class="twk"  cx="980" cy="44"  r="1.2" opacity=".65"/>
    <circle class="twk2" cx="1110" cy="84" r="0.8" opacity=".4"/>
    <circle class="twk"  cx="140" cy="300" r="0.7" opacity=".35"/>
    <circle class="twk2" cx="1080" cy="280" r="1.0" opacity=".5"/>
    <circle class="twk"  cx="60"  cy="470" r="0.9" opacity=".45"/>
    <circle class="twk2" cx="1140" cy="500" r="1.1" opacity=".55"/>
    <circle class="twk"  cx="250" cy="520" r="0.8" opacity=".4"/>
    <circle class="twk2" cx="900" cy="510" r="0.7" opacity=".35"/>
  </g>
  <g fill="#39E0FF">
    <circle class="twk"  cx="400" cy="28"  r="1.6" opacity=".5"/>
    <circle class="twk2" cx="760" cy="96"  r="1.6" opacity=".4"/>
    <circle class="twk"  cx="1040" cy="120" r="1.6" opacity=".45"/>
  </g>

  <!-- title -->
  <text x="600" y="58" text-anchor="middle" class="lbl" fill="#E8ECF6" font-size="24" font-weight="700" filter="url(#cstack__glowFine)">The 6-Layer Composition Stack</text>
  <text x="600" y="84" text-anchor="middle" class="lbl" fill="#7E879F" font-size="13.5">Every tool call passes through six guards — outermost first — so the dumb mistakes never reach Chrome.</text>

  <!-- ENTRY: AI request packet -->
  <text x="125" y="118" text-anchor="middle" class="mono" fill="#C2C9DD" font-size="12">AI tool call</text>

  <!-- the descending telemetry packet -->
  <g filter="url(#cstack__glow)">
    <circle cx="125" cy="158" r="6" fill="#39E0FF">
      <animate attributeName="cy" values="158;468;158" keyTimes="0;0.9;1" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0 0 1 1"/>
      <animate attributeName="opacity" values="1;1;1;0.2;1" keyTimes="0;0.85;0.9;0.95;1" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- LAYER ROWS -->
  <!-- geometry: 6 rows, x=200..1140, each 56 tall, starting y=140 -->
  <!-- Row template via groups -->

  <!-- Row 1 Recorder -->
  <g>
    <rect x="200" y="140" width="940" height="48" rx="10" fill="#0E1120" stroke="#222742" stroke-width="1"/>
    <rect x="200" y="140" width="6" height="48" rx="3" fill="url(#cstack__accentArc)"/>
    <text x="230" y="163" class="lbl" fill="#E8ECF6" font-size="15" font-weight="600">1 · Recorder</text>
    <text x="230" y="180" class="lbl" fill="#7E879F" font-size="11.5">Captures every request/response as redacted JSONL — replay any session deterministically.</text>
    <text x="1118" y="170" text-anchor="end" class="mono" fill="#39E0FF" font-size="11" opacity=".85">replay</text>
  </g>
  <!-- Row 2 Hinter -->
  <g>
    <rect x="200" y="204" width="940" height="48" rx="10" fill="#0E1120" stroke="#222742" stroke-width="1"/>
    <rect x="200" y="204" width="6" height="48" rx="3" fill="url(#cstack__accentArc)"/>
    <text x="230" y="227" class="lbl" fill="#E8ECF6" font-size="15" font-weight="600">2 · Hinter</text>
    <text x="230" y="244" class="lbl" fill="#7E879F" font-size="11.5">Watches for anti-patterns &amp; injects typemap lessons — steers the agent before it wastes a call.</text>
    <text x="1118" y="234" text-anchor="end" class="mono" fill="#8B7DFF" font-size="11" opacity=".85">lessons</text>
  </g>
  <!-- Row 3 Degradation -->
  <g>
    <rect x="200" y="268" width="940" height="48" rx="10" fill="#0E1120" stroke="#222742" stroke-width="1"/>
    <rect x="200" y="268" width="6" height="48" rx="3" fill="url(#cstack__accentArc)"/>
    <text x="230" y="291" class="lbl" fill="#E8ECF6" font-size="15" font-weight="600">3 · Degradation</text>
    <text x="230" y="308" class="lbl" fill="#7E879F" font-size="11.5">Graceful fallback when Chrome is down or the typemap is missing — partial answers beat hard crashes.</text>
    <text x="1118" y="298" text-anchor="end" class="mono" fill="#FFC24B" font-size="11" opacity=".85">fallback</text>
  </g>
  <!-- Row 4 Budget gate -->
  <g>
    <rect x="200" y="332" width="940" height="48" rx="10" fill="#0E1120" stroke="#222742" stroke-width="1"/>
    <rect x="200" y="332" width="6" height="48" rx="3" fill="url(#cstack__successBar)"/>
    <text x="230" y="355" class="lbl" fill="#E8ECF6" font-size="15" font-weight="600">4 · Budget Gate</text>
    <text x="230" y="372" class="lbl" fill="#7E879F" font-size="11.5">Decides run / downgrade / skip by token cost — the spend dial of the whole server. Up to 92% saved.</text>
    <!-- mini savings meter -->
    <rect x="980" y="349" width="138" height="14" rx="7" fill="#151A2E" stroke="#222742" stroke-width="1"/>
    <rect x="982" y="351" width="0" height="10" rx="5" fill="url(#cstack__successBar)" class="pulse">
      <animate attributeName="width" values="0;127;127;0" keyTimes="0;0.5;0.85;1" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0 0 1 1; 0.4 0 0.2 1"/>
    </rect>
  </g>
  <!-- Row 5 Reflect -->
  <g>
    <rect x="200" y="396" width="940" height="48" rx="10" fill="#0E1120" stroke="#222742" stroke-width="1"/>
    <rect x="200" y="396" width="6" height="48" rx="3" fill="url(#cstack__accentArc)"/>
    <text x="230" y="419" class="lbl" fill="#E8ECF6" font-size="15" font-weight="600">5 · Reflect</text>
    <text x="230" y="436" class="lbl" fill="#7E879F" font-size="11.5">Reads back only the values a mutation changed — saves 5–15k tokens per write, no re-fetch needed.</text>
    <text x="1118" y="426" text-anchor="end" class="mono" fill="#3FE0A3" font-size="11" opacity=".85">−15k</text>
  </g>
  <!-- Row 6 Schema guard -->
  <g>
    <rect x="200" y="460" width="940" height="48" rx="10" fill="#0E1120" stroke="#222742" stroke-width="1"/>
    <rect x="200" y="460" width="6" height="48" rx="3" fill="url(#cstack__accentArc)"/>
    <text x="230" y="483" class="lbl" fill="#E8ECF6" font-size="15" font-weight="600">6 · Schema Guard</text>
    <text x="230" y="500" class="lbl" fill="#7E879F" font-size="11.5">Pre-flight validation — catches typos &amp; impossible mutations before they ever touch the build.</text>
    <text x="1118" y="490" text-anchor="end" class="mono" fill="#39E0FF" font-size="11" opacity=".85">validate</text>
  </g>

  <!-- EXIT: the moon (Chrome / Luna build) -->
  <g transform="translate(125,512)">
    <ellipse cx="0" cy="0" rx="46" ry="20" fill="none" stroke="url(#cstack__accentArc)" stroke-width="3" opacity="0.5"/>
    <circle cx="0" cy="0" r="14" fill="url(#cstack__moonBody)" filter="url(#cstack__halo)"/>
  </g>
  <text x="125" y="548" text-anchor="middle" class="mono" fill="#C2C9DD" font-size="11">Luna build · Chrome</text>
</svg>
