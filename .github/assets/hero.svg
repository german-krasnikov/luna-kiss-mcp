    <circle class="twinkle d1" cx="500" cy="78"  r="0.7" opacity="0.4"/>
    <circle class="twinkle d3" cx="556" cy="208" r="0.9" opacity="0.5"/>
    <circle class="twinkle"    cx="612" cy="296" r="0.8" opacity="0.45"/>
    <circle class="twinkle d2" cx="668" cy="118" r="0.6" opacity="0.35"/>
