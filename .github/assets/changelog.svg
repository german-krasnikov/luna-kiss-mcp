<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 960" width="900" height="960" role="img" aria-labelledby="cl-title cl-desc">
<title id="cl-title">Luna MCP — Release Timeline</title>
<desc id="cl-desc">An animated vertical changelog. Five milestones reveal in sequence top to bottom as a marker descends a glowing gradient spine: Phase A+B+C (Foundation), Waves 1-6 (The brain), Token Economy (up to 92% saved), Sprints 1-6 (Probes and field-readiness), and v0.1.0 Beta (Touchdown) with 198 tools, 1620 tests, and 30,236 LOC.</desc>
<defs>
<linearGradient id="sky" x1="0" y1="0" x2="0.65" y2="1"><stop offset="0" stop-color="#05060B"/><stop offset="0.5" stop-color="#080A14"/><stop offset="1" stop-color="#0E1120"/></linearGradient>
<linearGradient id="spine" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#8B7DFF"/><stop offset="0.32" stop-color="#6AB6FF"/><stop offset="0.58" stop-color="#39E0FF"/><stop offset="1" stop-color="#3FE0A3"/></linearGradient>
<linearGradient id="bv" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#8B7DFF"/><stop offset="1" stop-color="#6AB6FF"/></linearGradient>
<linearGradient id="bc" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#39E0FF"/><stop offset="1" stop-color="#6AB6FF"/></linearGradient>
<linearGradient id="bgr" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3FE0A3"/><stop offset="1" stop-color="#39E0FF"/></linearGradient>
<linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#12172B"/><stop offset="1" stop-color="#0B0E1C"/></linearGradient>
<linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#9FD4FF" stop-opacity="0"/><stop offset="0.5" stop-color="#9FD4FF" stop-opacity="0.5"/><stop offset="1" stop-color="#9FD4FF" stop-opacity="0"/></linearGradient>
<radialGradient id="halo" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#3FE0A3" stop-opacity="0.85"/><stop offset="1" stop-color="#3FE0A3" stop-opacity="0"/></radialGradient>
<filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
<feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<clipPath id="c1"><rect x="0" y="0" width="700" height="92" rx="12"/></clipPath>
<clipPath id="c2"><rect x="0" y="0" width="700" height="92" rx="12"/></clipPath>
<clipPath id="c3"><rect x="0" y="0" width="700" height="92" rx="12"/></clipPath>
<clipPath id="c4"><rect x="0" y="0" width="700" height="92" rx="12"/></clipPath>
<clipPath id="c5"><rect x="0" y="0" width="700" height="106" rx="12"/></clipPath>
