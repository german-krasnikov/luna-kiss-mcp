<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 380" width="920" height="380" role="img" aria-labelledby="tsav__title tsav__desc">
  <title id="tsav__title">Luna MCP token-economy savings panel</title>
  <desc id="tsav__desc">Animated telemetry panel. Six savings mechanisms shown as glowing bars that grow on load: batch 80 percent plus, Visual Tier 1 30 to 100 times, JPEG screenshots 3 to 5 times, Set-of-Mark 70 to 90 percent, Budget Router up to 92 percent, and server-side sampling about 28000 tokens saved.</desc>

  <defs>
    <!-- shared gradients, re-declared with exact hexes, namespaced -->
    <linearGradient id="tsav__skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#05060B"/>
      <stop offset="55%" stop-color="#080A14"/>
      <stop offset="100%" stop-color="#0E1120"/>
    </linearGradient>

    <linearGradient id="tsav__accentArc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#39E0FF"/>
      <stop offset="50%" stop-color="#6AB6FF"/>
      <stop offset="100%" stop-color="#8B7DFF"/>
    </linearGradient>

    <linearGradient id="tsav__successBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3FE0A3"/>
      <stop offset="100%" stop-color="#39E0FF"/>
    </linearGradient>

    <radialGradient id="tsav__moonBody" cx="38%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#E8ECF6"/>
      <stop offset="42%" stop-color="#A9B6D9"/>
      <stop offset="78%" stop-color="#3A4360"/>
      <stop offset="100%" stop-color="#10131F"/>
    </radialGradient>

    <!-- canonical soft-glow recipes -->
    <filter id="tsav__glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tsav__glowFine" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tsav__glowHalo" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- clip so each bar's fill grows within its own track -->
    <clipPath id="tsav__clipA"><rect x="250" y="78"  width="540" height="22" rx="11"/></clipPath>
    <clipPath id="tsav__clipB"><rect x="250" y="122" width="540" height="22" rx="11"/></clipPath>
    <clipPath id="tsav__clipC"><rect x="250" y="166" width="540" height="22" rx="11"/></clipPath>
    <clipPath id="tsav__clipD"><rect x="250" y="210" width="540" height="22" rx="11"/></clipPath>
    <clipPath id="tsav__clipE"><rect x="250" y="254" width="540" height="22" rx="11"/></clipPath>
    <clipPath id="tsav__clipF"><rect x="250" y="298" width="540" height="22" rx="11"/></clipPath>
  </defs>

  <style>
    /* ---- bar grow-in (scaleX from left anchor of each row) ---- */
    @keyframes tsav-grow-a { from { transform: scaleX(0); } to { transform: scaleX(1); } }
    .tsav-fill {
      transform-box: fill-box;
      transform-origin: left center;
      animation: tsav-grow-a 3s cubic-bezier(0.4,0,0.2,1) forwards;
    }
    .tsav-d1 { animation-delay: .15s; }
    .tsav-d2 { animation-delay: .30s; }
    .tsav-d3 { animation-delay: .45s; }
    .tsav-d4 { animation-delay: .60s; }
    .tsav-d5 { animation-delay: .75s; }
    .tsav-d6 { animation-delay: .90s; }

    /* numbers fade up after their bar */
    @keyframes tsav-num { from { opacity: 0; } to { opacity: 1; } }
    .tsav-num { opacity: 0; animation: tsav-num 1.2s ease forwards; }

    /* sweep shimmer riding the success fill */
    @keyframes tsav-sweep { 0% { transform: translateX(-120px);} 100% { transform: translateX(560px);} }
    .tsav-shimmer { animation: tsav-sweep 3s cubic-bezier(0.4,0,0.2,1) infinite; }

    /* star twinkle (opacity only) */
    @keyframes tsav-twinkle { 0%,100% { opacity: .25; } 50% { opacity: .85; } }
    .tsav-star { animation: tsav-twinkle 2.4s ease-in-out infinite; }
    .tsav-star.b { animation-delay: .8s; }
    .tsav-star.c { animation-delay: 1.6s; }

    /* moon halo gentle pulse */
    @keyframes tsav-pulse { 0%,100% { opacity:.55; } 50% { opacity:.9; } }
    .tsav-halo { animation: tsav-pulse 2.4s ease-in-out infinite; }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
      .tsav-fill { transform: scaleX(1) !important; }
      .tsav-num { opacity: 1 !important; }
      .tsav-shimmer { display: none; }
    }
  </style>

  <!-- canvas -->
  <rect x="0" y="0" width="920" height="380" rx="16" fill="url(#tsav__skyGrad)"/>
  <rect x="0.5" y="0.5" width="919" height="379" rx="16" fill="none" stroke="#222742" stroke-width="1"/>

  <!-- starfield (twinkle, never moves) -->
  <g fill="#F4F7FF">
    <circle class="tsav-star"   cx="60"  cy="40"  r="1.0" opacity=".5"/>
    <circle class="tsav-star b" cx="130" cy="28"  r="0.8" opacity=".4"/>
    <circle class="tsav-star c" cx="210" cy="46"  r="1.2" opacity=".6"/>
    <circle class="tsav-star"   cx="300" cy="24"  r="0.7" opacity=".35"/>
    <circle class="tsav-star b" cx="395" cy="50"  r="1.0" opacity=".5"/>
    <circle class="tsav-star c" cx="500" cy="30"  r="0.9" opacity=".45"/>
    <circle class="tsav-star"   cx="615" cy="44"  r="1.3" opacity=".6"/>
    <circle class="tsav-star b" cx="720" cy="26"  r="0.8" opacity=".4"/>
    <circle class="tsav-star c" cx="820" cy="48"  r="1.1" opacity=".55"/>
    <circle class="tsav-star"   cx="880" cy="32"  r="0.7" opacity=".35"/>
    <circle class="tsav-star b" cx="40"  cy="120" r="0.9" opacity=".45"/>
    <circle class="tsav-star c" cx="900" cy="150" r="1.0" opacity=".5"/>
    <circle class="tsav-star"   cx="36"  cy="250" r="0.8" opacity=".4"/>
    <circle class="tsav-star b" cx="905" cy="300" r="1.2" opacity=".55"/>
    <circle class="tsav-star c" cx="48"  cy="340" r="0.7" opacity=".35"/>
    <circle class="tsav-star"   cx="170" cy="360" r="0.9" opacity=".4"/>
  </g>
  <g fill="#39E0FF">
    <circle class="tsav-star"   cx="250" cy="36" r="1.6" opacity=".5" filter="url(#tsav__glowFine)"/>
    <circle class="tsav-star c" cx="660" cy="34" r="1.6" opacity=".45" filter="url(#tsav__glowFine)"/>
  </g>

  <!-- header -->
  <text x="32" y="44" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="700"
        fill="#E8ECF6" filter="url(#tsav__glowFine)">TOKEN ECONOMY</text>
  <text x="32" y="62" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11"
        fill="#7E879F">savings telemetry · every byte is rent</text>

  <!-- orbiting-moon signature, top-right -->
  <g transform="translate(852,40)">
    <ellipse cx="0" cy="0" rx="34" ry="14" fill="none" stroke="url(#tsav__accentArc)" stroke-width="3" opacity="0.5"/>
    <circle class="tsav-halo" cx="0" cy="0" r="13" fill="#39E0FF" opacity="0.5" filter="url(#tsav__glowHalo)"/>
    <circle cx="0" cy="0" r="11" fill="url(#tsav__moonBody)"/>
    <circle r="2.4" fill="#39E0FF" filter="url(#tsav__glowFine)">
      <animateMotion dur="24s" repeatCount="indefinite" rotate="auto"
        path="M34,0 A34,14 0 1,1 -34,0 A34,14 0 1,1 34,0"/>
    </circle>
  </g>

  <!-- ===== ROWS ===== -->
  <!-- Row A: batch 80%+ (success bar) -->
  <text x="32" y="93" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#C2C9DD">batch · one round-trip</text>
  <rect x="250" y="78" width="540" height="22" rx="11" fill="#151A2E" stroke="#222742" stroke-width="1"/>
  <g clip-path="url(#tsav__clipA)">
    <rect class="tsav-fill tsav-d1" x="250" y="78" width="432" height="22" rx="11" fill="url(#tsav__successBar)"/>
    <rect class="tsav-shimmer" x="250" y="78" width="50" height="22" fill="#F4F7FF" opacity="0.12"/>
  </g>
  <text class="tsav-num tsav-d1" x="800" y="95" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="16" font-weight="700" fill="#3FE0A3" filter="url(#tsav__glowFine)">80%+</text>

  <!-- Row B: Visual Tier 1 30-100x -->
  <text x="32" y="137" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#C2C9DD">Visual Tier 1 · text not PNG</text>
  <rect x="250" y="122" width="540" height="22" rx="11" fill="#151A2E" stroke="#222742" stroke-width="1"/>
  <g clip-path="url(#tsav__clipB)">
    <rect class="tsav-fill tsav-d2" x="250" y="122" width="540" height="22" rx="11" fill="url(#tsav__successBar)"/>
    <rect class="tsav-shimmer" x="250" y="122" width="50" height="22" fill="#F4F7FF" opacity="0.12"/>
  </g>
  <text class="tsav-num tsav-d2" x="770" y="139" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="16" font-weight="700" fill="#3FE0A3" filter="url(#tsav__glowFine)">30–100×</text>

  <!-- Row C: JPEG 3-5x -->
  <text x="32" y="181" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#C2C9DD">JPEG screenshots</text>
  <rect x="250" y="166" width="540" height="22" rx="11" fill="#151A2E" stroke="#222742" stroke-width="1"/>
  <g clip-path="url(#tsav__clipC)">
    <rect class="tsav-fill tsav-d3" x="250" y="166" width="216" height="22" rx="11" fill="url(#tsav__successBar)"/>
    <rect class="tsav-shimmer" x="250" y="166" width="50" height="22" fill="#F4F7FF" opacity="0.12"/>
  </g>
  <text class="tsav-num tsav-d3" x="788" y="183" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="16" font-weight="700" fill="#3FE0A3" filter="url(#tsav__glowFine)">3–5×</text>

  <!-- Row D: Set-of-Mark 70-90% -->
  <text x="32" y="225" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#C2C9DD">Set-of-Mark · interactive flows</text>
  <rect x="250" y="210" width="540" height="22" rx="11" fill="#151A2E" stroke="#222742" stroke-width="1"/>
  <g clip-path="url(#tsav__clipD)">
    <rect class="tsav-fill tsav-d4" x="250" y="210" width="486" height="22" rx="11" fill="url(#tsav__successBar)"/>
    <rect class="tsav-shimmer" x="250" y="210" width="50" height="22" fill="#F4F7FF" opacity="0.12"/>
  </g>
  <text class="tsav-num tsav-d4" x="770" y="227" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="16" font-weight="700" fill="#3FE0A3" filter="url(#tsav__glowFine)">70–90%</text>

  <!-- Row E: Budget Router up to 92% -->
  <text x="32" y="269" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#C2C9DD">Cost Budget Router · smart routing</text>
  <rect x="250" y="254" width="540" height="22" rx="11" fill="#151A2E" stroke="#222742" stroke-width="1"/>
  <g clip-path="url(#tsav__clipE)">
    <rect class="tsav-fill tsav-d5" x="250" y="254" width="497" height="22" rx="11" fill="url(#tsav__successBar)"/>
    <rect class="tsav-shimmer" x="250" y="254" width="50" height="22" fill="#F4F7FF" opacity="0.12"/>
  </g>
  <text class="tsav-num tsav-d5" x="772" y="271" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="16" font-weight="700" fill="#3FE0A3" filter="url(#tsav__glowFine)">↑ 92%</text>

  <!-- Row F: server-side sampling ~28k -->
  <text x="32" y="313" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#C2C9DD">Server-side Haiku sampling</text>
  <rect x="250" y="298" width="540" height="22" rx="11" fill="#151A2E" stroke="#222742" stroke-width="1"/>
  <g clip-path="url(#tsav__clipF)">
    <rect class="tsav-fill tsav-d6" x="250" y="298" width="513" height="22" rx="11" fill="url(#tsav__accentArc)"/>
    <rect class="tsav-shimmer" x="250" y="298" width="50" height="22" fill="#F4F7FF" opacity="0.12"/>
  </g>
  <text class="tsav-num tsav-d6" x="762" y="315" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="16" font-weight="700" fill="#39E0FF" filter="url(#tsav__glowFine)">~28k saved</text>

  <!-- footer accent divider -->
  <rect x="32" y="344" width="856" height="2" rx="1" fill="url(#tsav__accentArc)" opacity="0.55" filter="url(#tsav__glow)"/>
  <text x="32" y="366" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10.5"
        fill="#566079">plain-text responses · no cache · KISS = Keep It Simple</text>
</svg>
