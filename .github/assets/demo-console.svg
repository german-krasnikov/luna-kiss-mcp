<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" width="1200" height="360" preserveAspectRatio="xMidYMid meet">
  <title>Luna MCP live console — you ask a question in plain language, the matching debug tool fires and returns telemetry</title>

  <defs>
    <linearGradient id="demo__skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#05060B"/>
      <stop offset="55%" stop-color="#080A14"/>
      <stop offset="100%" stop-color="#0E1120"/>
    </linearGradient>
    <linearGradient id="demo__accentArc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#39E0FF"/>
      <stop offset="50%" stop-color="#6AB6FF"/>
      <stop offset="100%" stop-color="#8B7DFF"/>
    </linearGradient>
    <linearGradient id="demo__successBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3FE0A3"/>
      <stop offset="100%" stop-color="#39E0FF"/>
    </linearGradient>
    <radialGradient id="demo__moonBody" cx="38%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#E8ECF6"/>
      <stop offset="42%" stop-color="#A9B6D9"/>
      <stop offset="78%" stop-color="#3A4360"/>
      <stop offset="100%" stop-color="#10131F"/>
    </radialGradient>
    <filter id="demo__glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="demo__glowFine" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="demo__halo" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="demo__screenClip"><rect x="24" y="24" width="1152" height="312" rx="16"/></clipPath>
  </defs>

  <style>
    .twinkle { animation: demo_tw 2.4s ease-in-out infinite; }
    .twinkle.b { animation-delay: -0.8s; }
    .twinkle.c { animation-delay: -1.6s; }
    @keyframes demo_tw { 0%,100% { opacity:.30 } 50% { opacity:.85 } }

    /* prompt caret blink */
    .caret { animation: demo_blink 1.06s steps(1,end) infinite; }
    @keyframes demo_blink { 0%,49% { opacity:1 } 50%,100% { opacity:0 } }

    /* one 24s storyline, four beats — ask -> tool fires -> result -> reset */
    .ask     { opacity:0; animation: demo_ask 24s cubic-bezier(0.4,0.0,0.2,1) infinite; }
    .toolpill{ opacity:0; transform-box: fill-box; transform-origin:center; animation: demo_pill 24s cubic-bezier(0.4,0.0,0.2,1) infinite; }
    .result  { opacity:0; animation: demo_res 24s cubic-bezier(0.4,0.0,0.2,1) infinite; }
    .meterfill { transform: scaleX(0); transform-box: fill-box; transform-origin:left center; animation: demo_meter 24s cubic-bezier(0.4,0.0,0.2,1) infinite; }

    .b2 { animation-delay: -6s; }
    .b3 { animation-delay: -12s; }
    .b4 { animation-delay: -18s; }

    @keyframes demo_ask  { 0% {opacity:0} 3% {opacity:1} 22% {opacity:1} 25% {opacity:0} 100% {opacity:0} }
    @keyframes demo_pill { 0% {opacity:0; transform:scale(.92)} 8% {opacity:0; transform:scale(.92)} 11% {opacity:1; transform:scale(1)} 22% {opacity:1} 25% {opacity:0} 100% {opacity:0} }
    @keyframes demo_res  { 0% {opacity:0} 13% {opacity:0} 16% {opacity:1} 22% {opacity:1} 25% {opacity:0} 100% {opacity:0} }
    @keyframes demo_meter{ 0% {transform:scaleX(0)} 14% {transform:scaleX(0)} 21% {transform:scaleX(1)} 22% {transform:scaleX(1)} 25% {transform:scaleX(0)} 100% {transform:scaleX(0)} }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
      .ask, .toolpill, .result, .meterfill { opacity:1 !important; }
      .meterfill { transform: scaleX(1) !important; }
      .b2, .b3, .b4 { display:none; }
      .caret { opacity:1 !important; }
    }
  </style>

  <!-- backdrop -->
  <rect x="0" y="0" width="1200" height="360" fill="url(#demo__skyGrad)"/>

  <!-- starfield -->
  <g fill="#F4F7FF">
    <circle class="twinkle"   cx="70"   cy="58"  r="1.1" opacity=".6"/>
    <circle class="twinkle b" cx="150"  cy="120" r="0.8" opacity=".5"/>
    <circle class="twinkle c" cx="240"  cy="46"  r="1.3" opacity=".7"/>
    <circle class="twinkle"   cx="360"  cy="92"  r="0.7" opacity=".45"/>
    <circle class="twinkle b" cx="470"  cy="40"  r="1.0" opacity=".55"/>
    <circle class="twinkle c" cx="560"  cy="300" r="0.9" opacity=".5"/>
    <circle class="twinkle"   cx="690"  cy="62"  r="1.2" opacity=".65"/>
    <circle class="twinkle b" cx="820"  cy="320" r="0.8" opacity=".5"/>
    <circle class="twinkle c" cx="900"  cy="50"  r="1.0" opacity=".6"/>
    <circle class="twinkle"   cx="1010" cy="110" r="0.7" opacity=".45"/>
    <circle class="twinkle b" cx="1110" cy="64"  r="1.1" opacity=".6"/>
    <circle class="twinkle c" cx="1150" cy="280" r="0.9" opacity=".5"/>
    <circle class="twinkle"   cx="430"  cy="330" r="0.8" opacity=".4"/>
    <circle class="twinkle b" cx="120"  cy="300" r="0.7" opacity=".4"/>
  </g>
  <g fill="#39E0FF">
    <circle class="twinkle c" cx="980" cy="300" r="1.6" opacity=".5"/>
    <circle class="twinkle"   cx="300" cy="280" r="1.6" opacity=".45"/>
  </g>

  <!-- console frame -->
  <rect x="24" y="24" width="1152" height="312" rx="16" fill="#0E1120" stroke="#222742" stroke-width="1"/>

  <g clip-path="url(#demo__screenClip)">
    <!-- title bar -->
    <rect x="24" y="24" width="1152" height="46" fill="#151A2E"/>
    <line x1="24" y1="70" x2="1176" y2="70" stroke="#222742" stroke-width="1"/>
    <circle cx="52"  cy="47" r="5" fill="#FF5C7A"/>
    <circle cx="72"  cy="47" r="5" fill="#FFC24B"/>
    <circle cx="92"  cy="47" r="5" fill="#3FE0A3"/>

    <!-- orbiting moon glyph in the title bar -->
    <g transform="translate(1120,47)">
      <ellipse cx="0" cy="0" rx="26" ry="11" fill="none" stroke="url(#demo__accentArc)" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="8" fill="url(#demo__moonBody)" filter="url(#demo__halo)">
        <animateMotion dur="24s" repeatCount="indefinite" rotate="auto"
          path="M 26,0 A 26,11 0 1,1 -26,0 A 26,11 0 1,1 26,0"/>
      </circle>
    </g>
    <text x="116" y="52" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#7E879F">luna-mcp · chrome :9222 · CDP</text>

    <!-- prompt line: human asks in plain language -->
    <text x="48" y="116" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" fill="#566079">you</text>
    <text x="92" y="116" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" fill="#566079">›</text>

    <!-- four asks, cross-faded -->
    <g class="ask">    <text x="116" y="116" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#E8ECF6">Why is the coin invisible?</text></g>
    <g class="ask b2"> <text x="116" y="116" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#E8ECF6">The physics is jittering — diagnose it.</text></g>
    <g class="ask b3"> <text x="116" y="116" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#E8ECF6">Compare these two builds.</text></g>
    <g class="ask b4"> <text x="116" y="116" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#E8ECF6">Run the full endcard check in one shot.</text></g>

    <!-- blinking caret follows the asks -->
    <rect class="caret" x="118" y="104" width="9" height="3" fill="#39E0FF"/>

    <!-- tool firing line -->
    <text x="48" y="168" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" fill="#566079">luna</text>
    <text x="100" y="168" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" fill="#566079">⟶</text>

    <!-- tool pills, cross-faded -->
    <g class="toolpill">
      <rect x="128" y="151" width="186" height="26" rx="13" fill="#151A2E" stroke="#39E0FF" stroke-width="2"/>
      <circle cx="146" cy="164" r="3.5" fill="#39E0FF" filter="url(#demo__glowFine)"/>
      <text x="160" y="169" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#39E0FF">diagnose_object()</text>
    </g>
    <g class="toolpill b2">
      <rect x="128" y="151" width="190" height="26" rx="13" fill="#151A2E" stroke="#39E0FF" stroke-width="2"/>
      <circle cx="146" cy="164" r="3.5" fill="#39E0FF" filter="url(#demo__glowFine)"/>
      <text x="160" y="169" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#39E0FF">diagnose_physics()</text>
    </g>
    <g class="toolpill b3">
      <rect x="128" y="151" width="156" height="26" rx="13" fill="#151A2E" stroke="#39E0FF" stroke-width="2"/>
      <circle cx="146" cy="164" r="3.5" fill="#39E0FF" filter="url(#demo__glowFine)"/>
      <text x="160" y="169" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#39E0FF">diff_builds()</text>
    </g>
    <g class="toolpill b4">
      <rect x="128" y="151" width="200" height="26" rx="13" fill="#151A2E" stroke="#8B7DFF" stroke-width="2"/>
      <circle cx="146" cy="164" r="3.5" fill="#8B7DFF" filter="url(#demo__glowFine)"/>
      <text x="160" y="169" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#8B7DFF">do( ) · batch( )</text>
    </g>

    <!-- result lines, cross-faded -->
    <g class="result">    <text x="116" y="216" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15.5" fill="#C2C9DD">Renderer enabled, but <tspan fill="#FFC24B">alpha = 0</tspan> on the SpriteRenderer material.</text></g>
    <g class="result b2"> <text x="116" y="216" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15.5" fill="#C2C9DD">Backend <tspan fill="#8B7DFF">Verlet</tspan> · anchored-particle drift · seed 3 known fixes.</text></g>
    <g class="result b3"> <text x="116" y="216" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15.5" fill="#C2C9DD">14 files changed · culprit found via <tspan fill="#39E0FF">log(N) bisect</tspan>.</text></g>
    <g class="result b4"> <text x="116" y="216" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15.5" fill="#C2C9DD">7 steps, one round-trip · CTA tappable · <tspan fill="#3FE0A3">PASS</tspan>.</text></g>

    <!-- token-savings meter (the signature metric) -->
    <text x="48" y="280" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#7E879F">token budget saved</text>
    <rect x="48" y="292" width="1000" height="10" rx="5" fill="#151A2E" stroke="#222742" stroke-width="1"/>
    <g clip-path="url(#demo__screenClip)">
      <rect class="meterfill" x="48" y="292" width="1000" height="10" rx="5" fill="url(#demo__successBar)" filter="url(#demo__glowFine)"/>
    </g>
    <text x="1060" y="301" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#3FE0A3" filter="url(#demo__glowFine)">80%+ fewer tokens</text>

    <!-- bottom accent divider -->
    <line x1="48" y1="320" x2="1152" y2="320" stroke="url(#demo__accentArc)" stroke-width="1" opacity="0.35"/>
  </g>
</svg>
