    <circle class="twinkle d5" cx="382" cy="232" r="0.6" opacity="0.35"/>
    <circle class="twinkle d1" cx="528" cy="40"  r="0.9" opacity="0.5"/>
    <circle class="twinkle d3" cx="640" cy="160" r="0.7" opacity="0.4"/>
    <circle class="twinkle"    cx="752" cy="44"  r="0.8" opacity="0.45"/>
    <circle class="twinkle d2" cx="864" cy="40"  r="0.6" opacity="0.35"/>
    <circle class="twinkle d4" cx="976" cy="170" r="0.9" opacity="0.5"/>
    <circle class="twinkle d5" cx="1088" cy="260" r="0.7" opacity="0.4"/>
    <circle class="twinkle d1" cx="1140" cy="48"  r="0.8" opacity="0.45"/>
    <circle class="twinkle d3" cx="430" cy="118" r="0.6" opacity="0.35"/>
    <circle class="twinkle"    cx="586" cy="124" r="0.9" opacity="0.5"/>
    <circle class="twinkle d2" cx="700" cy="252" r="0.7" opacity="0.4"/>
    <circle class="twinkle d4" cx="818" cy="208" r="0.8" opacity="0.45"/>
    <circle class="twinkle d5" cx="930" cy="128" r="0.6" opacity="0.35"/>
    <circle class="twinkle d1" cx="1042" cy="300" r="0.9" opacity="0.5"/>
  </g>

  <!-- Beacon stars (cyan, low opacity) -->
  <g fill="#39E0FF" filter="url(#hero__glowFine)">
    <circle class="beacon"    cx="232" cy="92"  r="1.6"/>
    <circle class="beacon d2" cx="556" cy="276" r="1.6"/>
    <circle class="beacon d4" cx="1018" cy="84" r="1.6"/>
    <circle class="beacon d1" cx="772" cy="300" r="1.6"/>
  </g>

  <!-- ===== Orbiting-moon motif (right-of-center cluster) ===== -->
  <g class="drift">
    <!-- moon halo -->
    <circle cx="690" cy="170" r="120" fill="url(#hero__moonHalo)" filter="url(#hero__glowMoon)"/>

    <!-- orbit ring (elliptical), accent arc at ~0.5 opacity, 3px -->
    <ellipse cx="690" cy="170" rx="250" ry="96"
             fill="none" stroke="url(#hero__accentArc)" stroke-width="3"
             stroke-linecap="round" opacity="0.5"/>

    <!-- moon sphere -->
    <g class="moonPulse" filter="url(#hero__glowMoon)">
      <circle cx="690" cy="170" r="62" fill="url(#hero__moonBody)"/>
      <!-- subtle craters in shadowed limb -->
      <circle cx="712" cy="156" r="9"  fill="#10131F" opacity="0.30"/>
      <circle cx="722" cy="192" r="6"  fill="#10131F" opacity="0.28"/>
      <circle cx="698" cy="200" r="4"  fill="#10131F" opacity="0.24"/>
      <circle cx="676" cy="146" r="5"  fill="#3A4360" opacity="0.35"/>
    </g>

    <!-- Telemetry particles riding the elliptical orbit -->
    <g fill="#39E0FF" filter="url(#hero__glow)">
      <circle r="4">
        <animateMotion dur="24s" rotate="auto" repeatCount="indefinite"
                       keyPoints="0;1" keyTimes="0;1" calcMode="linear">
          <mpath xlink:href="#hero__orbitPath"/>
        </animateMotion>
      </circle>
    </g>
    <g fill="#8B7DFF" filter="url(#hero__glow)">
      <circle r="3.2">
        <animateMotion dur="24s" rotate="auto" repeatCount="indefinite"
                       keyPoints="0.4;1.4" keyTimes="0;1" calcMode="linear">
          <mpath xlink:href="#hero__orbitPath"/>
        </animateMotion>
      </circle>
    </g>
    <g fill="#6AB6FF" filter="url(#hero__glowFine)">
      <circle r="2.6">
        <animateMotion dur="24s" rotate="auto" repeatCount="indefinite"
                       keyPoints="0.72;1.72" keyTimes="0;1" calcMode="linear">
          <mpath xlink:href="#hero__orbitPath"/>
        </animateMotion>
      </circle>
    </g>
  </g>

  <!-- ===== Title block ===== -->
  <g text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif">
    <!-- Eyebrow / status chip -->
    <g transform="translate(600,72)">
      <rect x="-118" y="-15" width="236" height="30" rx="15"
            fill="#0E1120" stroke="#222742" stroke-width="1"/>
      <circle cx="-96" cy="0" r="3.2" fill="#3FE0A3" filter="url(#hero__glowFine)"/>
      <text x="6" y="4.5" fill="#C2C9DD" font-size="12.5" letter-spacing="3.2"
            font-weight="600">AI-NATIVE CDP DEBUGGER</text>
    </g>

    <!-- Title with animated gradient sweep -->
    <text x="600" y="186" font-size="104" font-weight="800" letter-spacing="1"
          fill="url(#hero__titleSweep)" filter="url(#hero__glow)">Luna MCP</text>

    <!-- Subtitle -->
    <text x="600" y="232" fill="#E8ECF6" font-size="22" font-weight="500"
          letter-spacing="0.4">Debug Luna playables straight from your AI assistant</text>

    <!-- Caption line -->
    <text x="600" y="262" fill="#7E879F" font-size="14" letter-spacing="0.6"
          font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">AI Assistant  ·  stdio  ·  MCP  ·  CDP WebSocket  ·  Chrome (Luna build)</text>
  </g>

  <!-- Rising particles — thermal exhaust stardust -->
  <g opacity="0.6">
    <circle cx="580" cy="340" r="1.4" fill="#39E0FF" style="--p:0.45">
      <animate attributeName="cy" values="340;-10" dur="8s"  begin="0s"   repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.45;0.3;0" dur="8s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="620" cy="340" r="1.0" fill="#39E0FF">
      <animate attributeName="cy" values="340;-10" dur="10s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.4;0.25;0" dur="10s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="340" r="1.6" fill="#8B7DFF">
      <animate attributeName="cy" values="340;-10" dur="7s"  begin="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.45;0.3;0" dur="7s" begin="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="660" cy="340" r="0.8" fill="#39E0FF">
      <animate attributeName="cy" values="340;-10" dur="12s" begin="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.35;0.2;0" dur="12s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="740" cy="340" r="1.2" fill="#8B7DFF">
      <animate attributeName="cy" values="340;-10" dur="9s"  begin="3.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.4;0.25;0" dur="9s" begin="3.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="550" cy="340" r="1.0" fill="#6AB6FF">
      <animate attributeName="cy" values="340;-10" dur="11s" begin="4.0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.3;0.2;0"  dur="11s" begin="4.0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="340" r="1.1" fill="#8B7DFF">
      <animate attributeName="cy" values="340;-10" dur="9.5s" begin="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.35;0.2;0" dur="9.5s" begin="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="720" cy="340" r="0.9" fill="#6AB6FF">
      <animate attributeName="cy" values="340;-10" dur="13s" begin="5.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.3;0.15;0" dur="13s" begin="5.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="340" r="1.3" fill="#3FE0A3">
      <animate attributeName="cy" values="340;-10" dur="14s" begin="2.0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.25;0.15;0" dur="14s" begin="2.0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="780" cy="340" r="0.7" fill="#3FE0A3">
      <animate attributeName="cy" values="340;-10" dur="11.5s" begin="6.0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.3;0.18;0" dur="11.5s" begin="6.0s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Stat chips with staggered entrance -->
  <g text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <g class="hero__chip c1" transform="translate(456,298)">
      <rect x="-66" y="-14" width="132" height="28" rx="14" fill="#151A2E" stroke="#222742" stroke-width="1"/>
      <text x="0" y="4.5" font-size="12.5" letter-spacing="0.4"><tspan fill="#39E0FF" font-weight="700">198</tspan><tspan fill="#C2C9DD"> tools</tspan></text>
    </g>
    <g class="hero__chip c2" transform="translate(600,298)">
      <rect x="-72" y="-14" width="144" height="28" rx="14" fill="#151A2E" stroke="#222742" stroke-width="1"/>
      <text x="0" y="4.5" font-size="12.5" letter-spacing="0.4"><tspan fill="#3FE0A3" font-weight="700">up to 92%</tspan><tspan fill="#C2C9DD"> fewer tokens</tspan></text>
    </g>
    <g class="hero__chip c3" transform="translate(744,298)">
      <rect x="-66" y="-14" width="132" height="28" rx="14" fill="#151A2E" stroke="#222742" stroke-width="1"/>
      <text x="0" y="4.5" font-size="12.5" letter-spacing="0.4"><tspan fill="#8B7DFF" font-weight="700">1620</tspan><tspan fill="#C2C9DD"> tests</tspan></text>
    </g>
  </g>

  <!-- Vignette to deepen edges -->
  <rect x="0" y="0" width="1200" height="340" rx="16" fill="url(#hero__vignette)" pointer-events="none"/>
  <!-- Hairline frame -->
  <rect x="0.5" y="0.5" width="1199" height="339" rx="16" fill="none" stroke="#222742" stroke-width="1"/>
</svg>
