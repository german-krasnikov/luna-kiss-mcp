<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-labelledby="aflow__title aflow__desc">
  <title id="aflow__title">Luna MCP data flow: AI Assistant over stdio to the Python FastMCP server, then over a CDP WebSocket to Chrome running the Luna build with JS helpers injected in the iframe.</title>
  <desc id="aflow__desc">Three control-room panels connected by two glowing cyan-to-violet telemetry links. Packets travel left to right; a small moon orbits over the server panel.</desc>

  <defs>
    <linearGradient id="aflow__skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#05060B"/>
      <stop offset="55%" stop-color="#080A14"/>
      <stop offset="100%" stop-color="#0E1120"/>
    </linearGradient>
    <linearGradient id="aflow__accentArc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#39E0FF"/>
      <stop offset="50%" stop-color="#6AB6FF"/>
      <stop offset="100%" stop-color="#8B7DFF"/>
    </linearGradient>
    <radialGradient id="aflow__moonBody" cx="38%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#E8ECF6"/>
      <stop offset="42%" stop-color="#A9B6D9"/>
      <stop offset="78%" stop-color="#3A4360"/>
      <stop offset="100%" stop-color="#10131F"/>
    </radialGradient>
    <filter id="aflow__glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="aflow__glowFine" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="aflow__halo" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    .lbl   { font-family: "Segoe UI", Helvetica, Arial, sans-serif; }
    .mono  { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .twinkle { animation: aflow__tw 2.4s ease-in-out infinite; }
    .twinkle.b { animation-delay: 1.1s; }
    .twinkle.c { animation-delay: .6s; }
    .sweep { stroke-dasharray: 16 220; animation: aflow__dash 3s linear infinite; }
    @keyframes aflow__tw { 0%,100% { opacity:.30 } 50% { opacity:.85 } }
    @keyframes aflow__dash { to { stroke-dashoffset: -236 } }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <!-- canvas -->
  <rect width="1200" height="360" fill="url(#aflow__skyGrad)"/>

  <!-- starfield (twinkle only, never move) -->
  <g fill="#F4F7FF">
    <circle class="twinkle"   cx="70"  cy="48"  r="1.1" opacity=".6"/>
    <circle class="twinkle b" cx="150" cy="92"  r="0.8" opacity=".4"/>
    <circle class="twinkle c" cx="240" cy="40"  r="1.3" opacity=".7"/>
    <circle class="twinkle"   cx="330" cy="300" r="0.9" opacity=".5"/>
    <circle class="twinkle b" cx="455" cy="70"  r="1.0" opacity=".55"/>
    <circle class="twinkle c" cx="560" cy="320" r="0.7" opacity=".35"/>
    <circle class="twinkle"   cx="690" cy="52"  r="1.2" opacity=".7"/>
    <circle class="twinkle b" cx="820" cy="300" r="0.8" opacity=".45"/>
    <circle class="twinkle c" cx="930" cy="64"  r="1.0" opacity=".6"/>
    <circle class="twinkle"   cx="1040" cy="40" r="1.4" opacity=".75"/>
    <circle class="twinkle b" cx="1110" cy="110" r="0.9" opacity=".5"/>
    <circle class="twinkle c" cx="1150" cy="300" r="0.8" opacity=".4"/>
    <circle class="twinkle"   cx="395" cy="160" r="0.7" opacity=".4"/>
    <circle class="twinkle b" cx="620" cy="150" r="0.8" opacity=".45"/>
    <circle class="twinkle c" cx="870" cy="170" r="0.7" opacity=".4"/>
  </g>
  <g fill="#39E0FF">
    <circle class="twinkle"   cx="200" cy="260" r="1.6" opacity=".4"/>
    <circle class="twinkle b" cx="760" cy="280" r="1.6" opacity=".35"/>
    <circle class="twinkle c" cx="1000" cy="250" r="1.6" opacity=".4"/>
  </g>

  <!-- ===== LINK A: stdio (AI -> server) ===== -->
  <g>
    <line x1="290" y1="180" x2="430" y2="180" stroke="#222742" stroke-width="2" stroke-linecap="round"/>
    <line x1="290" y1="180" x2="430" y2="180" stroke="url(#aflow__accentArc)" stroke-width="2" stroke-linecap="round" class="sweep" filter="url(#aflow__glowFine)"/>
    <text x="360" y="168" text-anchor="middle" class="mono" font-size="12" fill="#39E0FF" filter="url(#aflow__glowFine)">stdio</text>
    <!-- traveling packet -->
    <circle r="4" fill="#39E0FF" filter="url(#aflow__glow)">
      <animate attributeName="cx" values="296;424" dur="3s" calcMode="spline" keyTimes="0;1" keySplines="0.4 0 0.2 1" repeatCount="indefinite"/>
      <animate attributeName="cy" values="180;180" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ===== LINK B: CDP WebSocket (server -> chrome) ===== -->
  <g>
    <line x1="770" y1="180" x2="910" y2="180" stroke="#222742" stroke-width="2" stroke-linecap="round"/>
    <line x1="770" y1="180" x2="910" y2="180" stroke="url(#aflow__accentArc)" stroke-width="2" stroke-linecap="round" class="sweep" style="animation-delay:1.5s" filter="url(#aflow__glowFine)"/>
    <text x="840" y="168" text-anchor="middle" class="mono" font-size="12" fill="#8B7DFF" filter="url(#aflow__glowFine)">CDP WebSocket</text>
    <circle r="4" fill="#8B7DFF" filter="url(#aflow__glow)">
      <animate attributeName="cx" values="776;904" dur="3s" begin="1.5s" calcMode="spline" keyTimes="0;1" keySplines="0.4 0 0.2 1" repeatCount="indefinite"/>
      <animate attributeName="cy" values="180;180" dur="3s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ===== PANEL 1: AI Assistant ===== -->
  <g>
    <rect x="56" y="120" width="234" height="120" rx="10" fill="#0E1120" stroke="#222742" stroke-width="1"/>
    <rect x="56" y="120" width="234" height="120" rx="10" fill="none" stroke="#39E0FF" stroke-width="1.5" opacity=".25"/>
    <!-- chat glyph -->
    <g stroke="#39E0FF" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#aflow__glowFine)">
      <rect x="84" y="150" width="46" height="34" rx="8"/>
      <path d="M96 184 l-8 12 l16 -12"/>
      <line x1="94" y1="161" x2="120" y2="161"/>
      <line x1="94" y1="171" x2="112" y2="171"/>
    </g>
    <text x="150" y="158" class="lbl" font-size="16" font-weight="bold" fill="#E8ECF6">AI Assistant</text>
    <text x="150" y="178" class="lbl" font-size="11.5" fill="#7E879F">Claude Code · Codex</text>
    <text x="150" y="194" class="lbl" font-size="11.5" fill="#7E879F">Cursor · Windsurf</text>
    <text x="150" y="222" class="mono" font-size="10.5" fill="#566079">any stdio MCP client</text>
  </g>

  <!-- ===== PANEL 2: Luna MCP server (with orbiting moon) ===== -->
  <g>
    <rect x="430" y="100" width="340" height="160" rx="16" fill="#0E1120" stroke="#222742" stroke-width="1"/>
    <rect x="430" y="100" width="340" height="160" rx="16" fill="none" stroke="url(#aflow__accentArc)" stroke-width="2" opacity=".45"/>

    <!-- orbit ring + moon motif -->
    <g transform="translate(600 134)">
      <ellipse cx="0" cy="0" rx="58" ry="20" fill="none" stroke="url(#aflow__accentArc)" stroke-width="3" opacity=".5"/>
      <g>
        <circle cx="58" cy="0" r="9" fill="url(#aflow__moonBody)" filter="url(#aflow__halo)"/>
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="24s" repeatCount="indefinite"/>
      </g>
    </g>

    <text x="600" y="184" text-anchor="middle" class="lbl" font-size="18" font-weight="bold" fill="#E8ECF6" filter="url(#aflow__glowFine)">Luna MCP</text>
    <text x="600" y="204" text-anchor="middle" class="lbl" font-size="12" fill="#C2C9DD">Python · FastMCP</text>
    <!-- token-economy chip -->
    <g>
      <rect x="498" y="218" width="204" height="22" rx="11" fill="#151A2E" stroke="#222742" stroke-width="1"/>
      <circle cx="514" cy="229" r="3" fill="#3FE0A3"/>
      <text x="600" y="233" text-anchor="middle" class="mono" font-size="10.5" fill="#3FE0A3">token-minimal · 198 tools</text>
    </g>
  </g>

  <!-- ===== PANEL 3: Chrome / Luna build ===== -->
  <g>
    <rect x="910" y="120" width="234" height="120" rx="10" fill="#0E1120" stroke="#222742" stroke-width="1"/>
    <rect x="910" y="120" width="234" height="120" rx="10" fill="none" stroke="#8B7DFF" stroke-width="1.5" opacity=".25"/>
    <!-- browser glyph with inner iframe -->
    <g stroke="#8B7DFF" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#aflow__glowFine)">
      <rect x="936" y="150" width="46" height="36" rx="6"/>
      <line x1="936" y1="160" x2="982" y2="160"/>
      <circle cx="942" cy="155" r="1.2" fill="#8B7DFF"/>
      <circle cx="947" cy="155" r="1.2" fill="#8B7DFF"/>
      <rect x="943" y="165" width="32" height="15" rx="2" stroke="#39E0FF"/>
    </g>
    <text x="1006" y="158" class="lbl" font-size="16" font-weight="bold" fill="#E8ECF6">Chrome</text>
    <text x="1006" y="178" class="lbl" font-size="11.5" fill="#7E879F">Luna build (Unity→JS)</text>
    <text x="1006" y="194" class="lbl" font-size="11.5" fill="#7E879F">JS helpers in iframe</text>
    <text x="1006" y="222" class="mono" font-size="10.5" fill="#566079">luna_helpers.js v1.6.1</text>
  </g>

  <!-- baseline caption -->
  <text x="600" y="330" text-anchor="middle" class="lbl" font-size="12.5" fill="#7E879F">
    Lazy auto-connect on first tool call · no cache — every call reads live scene state over CDP
  </text>
</svg>
