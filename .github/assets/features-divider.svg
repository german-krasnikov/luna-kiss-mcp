<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" width="1200" height="120" role="img" aria-labelledby="fdiv__title fdiv__desc">
  <title id="fdiv__title">Luna MCP — Capabilities telemetry divider</title>
  <desc id="fdiv__desc">A cyan-to-violet telemetry line sweeps across a deep-space band while a small lunar sphere orbits a faint ring, with a quiet twinkling starfield.</desc>
  <defs>
    <!-- shared: luna-hero-sky (re-declared with exact stops) -->
    <linearGradient id="fdiv__skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#05060B"/>
      <stop offset="55%" stop-color="#080A14"/>
      <stop offset="100%" stop-color="#0E1120"/>
    </linearGradient>
    <!-- shared: luna-accent-arc (cyan -> blue -> violet) -->
    <linearGradient id="fdiv__accentArc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#39E0FF"/>
      <stop offset="50%" stop-color="#6AB6FF"/>
      <stop offset="100%" stop-color="#8B7DFF"/>
    </linearGradient>
    <!-- shared: luna-moon-body (lit silver crescent -> shadowed limb) -->
    <radialGradient id="fdiv__moonBody" cx="38%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#E8ECF6"/>
      <stop offset="42%" stop-color="#A9B6D9"/>
      <stop offset="78%" stop-color="#3A4360"/>
      <stop offset="100%" stop-color="#10131F"/>
    </radialGradient>
    <!-- shared: luna-success-bar (green -> cyan) for the savings pip -->
    <linearGradient id="fdiv__successBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3FE0A3"/>
      <stop offset="100%" stop-color="#39E0FF"/>
    </linearGradient>
    <!-- canonical soft-glow recipes -->
    <filter id="fdiv__glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fdiv__glowMoon" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fdiv__glowFine" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .twinkle{animation:fdiv__tw 2.4s ease-in-out infinite}
      .twinkle.b{animation-delay:.8s}
      .twinkle.c{animation-delay:1.6s}
      .pulse{animation:fdiv__pulse 2.4s ease-in-out infinite}
      @keyframes fdiv__tw{0%,100%{opacity:.30}50%{opacity:.85}}
      @keyframes fdiv__pulse{0%,100%{opacity:.55}50%{opacity:1}}
      @media (prefers-reduced-motion: reduce){
        * { animation: none !important; }
      }
    </style>
  </defs>

  <!-- canvas -->
  <rect x="0" y="0" width="1200" height="120" fill="url(#fdiv__skyGrad)"/>

  <!-- starfield: ~20 scattered stars, never on a grid -->
  <g fill="#F4F7FF">
    <circle class="twinkle" cx="40" cy="22" r="0.9" opacity=".55"/>
    <circle class="twinkle b" cx="118" cy="64" r="0.7" opacity=".40"/>
    <circle class="twinkle c" cx="186" cy="30" r="1.1" opacity=".65"/>
    <circle class="twinkle" cx="250" cy="86" r="0.8" opacity=".45"/>
    <circle class="twinkle b" cx="330" cy="44" r="0.6" opacity=".35"/>
    <circle class="twinkle c" cx="408" cy="18" r="1.0" opacity=".60"/>
    <circle class="twinkle" cx="470" cy="74" r="0.7" opacity=".40"/>
    <circle class="twinkle b" cx="556" cy="36" r="1.2" opacity=".70"/>
    <circle class="twinkle c" cx="628" cy="92" r="0.8" opacity=".45"/>
    <circle class="twinkle" cx="712" cy="26" r="0.9" opacity=".55"/>
    <circle class="twinkle b" cx="784" cy="66" r="0.6" opacity=".35"/>
    <circle class="twinkle c" cx="860" cy="40" r="1.1" opacity=".62"/>
    <circle class="twinkle" cx="930" cy="84" r="0.7" opacity=".42"/>
    <circle class="twinkle b" cx="1004" cy="22" r="0.9" opacity=".55"/>
    <circle class="twinkle c" cx="1070" cy="58" r="0.8" opacity=".45"/>
    <circle class="twinkle" cx="1140" cy="34" r="1.0" opacity=".58"/>
    <circle class="twinkle b" cx="1168" cy="90" r="0.7" opacity=".40"/>
  </g>
  <!-- beacon stars in cyan, low opacity -->
  <g fill="#39E0FF">
    <circle class="twinkle c" cx="214" cy="58" r="1.6" opacity=".30"/>
    <circle class="twinkle" cx="676" cy="48" r="1.6" opacity=".28"/>
    <circle class="twinkle b" cx="1052" cy="80" r="1.6" opacity=".30"/>
  </g>

  <!-- telemetry baseline: faint full-width hairline -->
  <line x1="60" y1="60" x2="1140" y2="60" stroke="#222742" stroke-width="1"/>

  <!-- animated accent sweep stroke (cyan->violet), dash marching across -->
  <line x1="60" y1="60" x2="1140" y2="60"
        stroke="url(#fdiv__accentArc)" stroke-width="2" stroke-linecap="round"
        stroke-dasharray="160 1080" filter="url(#fdiv__glow)" opacity=".9">
    <animate attributeName="stroke-dashoffset" from="0" to="-1240" dur="3s"
             repeatCount="indefinite" calcMode="linear"/>
  </line>

  <!-- savings pip riding the line (success-bar = savings semantics) -->
  <circle cx="60" cy="60" r="3.2" fill="url(#fdiv__successBar)" filter="url(#fdiv__glowFine)">
    <animate attributeName="cx" values="60;1140;60" dur="6s" repeatCount="indefinite"
             calcMode="spline" keyTimes="0;0.5;1"
             keySplines="0.4 0 0.2 1;0.4 0 0.2 1"/>
  </circle>

  <!-- orbiting-moon signature motif (left anchor) -->
  <g transform="translate(60,60)">
    <!-- orbit ring: 3px accent stroke at ~0.5 opacity -->
    <ellipse cx="0" cy="0" rx="34" ry="16" fill="none"
             stroke="url(#fdiv__accentArc)" stroke-width="3"
             stroke-linecap="round" opacity=".5"/>
    <!-- moon sphere on the ring, with halo -->
    <g filter="url(#fdiv__glowMoon)">
      <circle cx="34" cy="0" r="7" fill="url(#fdiv__moonBody)">
        <animateMotion dur="24s" repeatCount="indefinite" calcMode="linear"
                       path="M 0,-16 A 34,16 0 1,1 -0.1,-16 Z"/>
      </circle>
    </g>
  </g>

  <!-- section label, lunar-silver, fine glow on accent dot only -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif">
    <circle class="pulse" cx="118" cy="60" r="2.4" fill="#39E0FF" filter="url(#fdiv__glowFine)"/>
    <text x="132" y="55" fill="#E8ECF6" font-size="15" font-weight="700" letter-spacing="3">CAPABILITIES</text>
    <text x="132" y="74" fill="#7E879F" font-size="11" letter-spacing="1.5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">8 pillars · 149 tools · one CDP socket</text>
  </g>
</svg>
