<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" width="1200" height="220" role="img" aria-labelledby="eco-title eco-desc">
  <title id="eco-title">Luna MCP ecosystem constellation</title>
  <desc id="eco-desc">A moon orbiting along an elliptical telemetry ring against a deep-space starfield, with the cyan-to-violet accent sweep dividing the ecosystem section.</desc>
  <defs>
    <linearGradient id="eco__skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#05060B"/>
      <stop offset="55%" stop-color="#080A14"/>
      <stop offset="100%" stop-color="#0E1120"/>
    </linearGradient>
    <linearGradient id="eco__accentArc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#39E0FF"/>
      <stop offset="50%" stop-color="#6AB6FF"/>
      <stop offset="100%" stop-color="#8B7DFF"/>
    </linearGradient>
    <radialGradient id="eco__moonBody" cx="38%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#E8ECF6"/>
      <stop offset="42%" stop-color="#A9B6D9"/>
      <stop offset="78%" stop-color="#3A4360"/>
      <stop offset="100%" stop-color="#10131F"/>
    </radialGradient>
    <filter id="eco__glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="eco__glowFine" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="eco__halo" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes eco-tw { 0%,100% { opacity: .30; } 50% { opacity: .85; } }
    @keyframes eco-tw2 { 0%,100% { opacity: .55; } 50% { opacity: .22; } }
    @keyframes eco-sweep { 0% { stroke-dashoffset: 1180; } 100% { stroke-dashoffset: 0; } }
    @keyframes eco-pulse { 0%,100% { opacity: .45; } 50% { opacity: .9; } }
    .tw  { animation: eco-tw  2.4s cubic-bezier(0.4,0.0,0.2,1) infinite; }
    .tw2 { animation: eco-tw2 2.4s cubic-bezier(0.4,0.0,0.2,1) infinite; }
    .sweep { animation: eco-sweep 3s linear infinite; }
    .pulse { animation: eco-pulse 2.4s cubic-bezier(0.4,0.0,0.2,1) infinite; }
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
    }
  </style>

  <!-- Canvas -->
  <rect x="0" y="0" width="1200" height="220" fill="url(#eco__skyGrad)"/>
  <rect x="0.5" y="0.5" width="1199" height="219" rx="16" fill="none" stroke="#222742" stroke-width="1"/>

  <!-- Starfield (~30 scattered, never on a grid) -->
  <g fill="#F4F7FF">
    <circle class="tw"  cx="58"   cy="42"  r="0.9" opacity=".55"/>
    <circle class="tw2" cx="120"  cy="170" r="1.1" opacity=".40"/>
    <circle class="tw"  cx="190"  cy="70"  r="0.7" opacity=".60"/>
    <circle class="tw2" cx="245"  cy="130" r="1.0" opacity=".35"/>
    <circle class="tw"  cx="300"  cy="38"  r="1.2" opacity=".50"/>
    <circle class="tw2" cx="360"  cy="185" r="0.8" opacity=".45"/>
    <circle class="tw"  cx="430"  cy="60"  r="0.9" opacity=".65"/>
    <circle class="tw2" cx="500"  cy="150" r="0.6" opacity=".30"/>
    <circle class="tw"  cx="560"  cy="30"  r="1.0" opacity=".55"/>
    <circle class="tw2" cx="640"  cy="178" r="1.3" opacity=".42"/>
    <circle class="tw"  cx="720"  cy="55"  r="0.7" opacity=".70"/>
    <circle class="tw2" cx="780"  cy="140" r="0.9" opacity=".38"/>
    <circle class="tw"  cx="850"  cy="44"  r="1.1" opacity=".55"/>
    <circle class="tw2" cx="910"  cy="165" r="0.8" opacity=".48"/>
    <circle class="tw"  cx="975"  cy="72"  r="0.6" opacity=".60"/>
    <circle class="tw2" cx="1035" cy="150" r="1.0" opacity=".35"/>
    <circle class="tw"  cx="1095" cy="50"  r="0.9" opacity=".62"/>
    <circle class="tw2" cx="1150" cy="120" r="1.2" opacity=".44"/>
    <circle class="tw"  cx="160"  cy="110" r="0.8" opacity=".50"/>
    <circle class="tw2" cx="690"  cy="100" r="0.7" opacity=".40"/>
    <circle class="tw"  cx="1010" cy="40"  r="0.9" opacity=".58"/>
    <circle class="tw2" cx="80"   cy="120" r="0.6" opacity=".33"/>
  </g>
  <!-- Beacon stars (cyan, low opacity) -->
  <g fill="#39E0FF">
    <circle class="tw"  cx="220" cy="155" r="1.6" opacity=".40"/>
    <circle class="tw2" cx="615" cy="48"  r="1.6" opacity=".35"/>
    <circle class="tw"  cx="940" cy="95"  r="1.6" opacity=".38"/>
  </g>

  <!-- Orbital ring + moon, centered -->
  <g transform="translate(600,110)">
    <!-- Elliptical telemetry orbit (3px accent, ~0.5 opacity) -->
    <ellipse cx="0" cy="0" rx="190" ry="56" fill="none"
             stroke="url(#eco__accentArc)" stroke-width="3"
             stroke-linecap="round" opacity="0.5"/>
    <!-- Animated accent sweep tracing the orbit -->
    <ellipse class="sweep" cx="0" cy="0" rx="190" ry="56" fill="none"
             stroke="url(#eco__accentArc)" stroke-width="2"
             stroke-linecap="round" stroke-dasharray="180 1000"
             filter="url(#eco__glow)"/>

    <!-- Orbiting moon: rides the ring via animateMotion (static first frame at apoapsis-left) -->
    <g>
      <circle cx="-190" cy="0" r="22" fill="url(#eco__moonBody)" filter="url(#eco__halo)"/>
      <!-- subtle crater detail on the lit limb -->
      <circle cx="-198" cy="-6" r="3.4" fill="#10131F" opacity="0.30"/>
      <circle cx="-184" cy="5"  r="2.2" fill="#10131F" opacity="0.24"/>
      <animateMotion dur="24s" repeatCount="indefinite" rotate="0"
        path="M -190,0 A 190,56 0 1,1 190,0 A 190,56 0 1,1 -190,0 Z"
        keyPoints="0;1" keyTimes="0;1" calcMode="linear"/>
    </g>

    <!-- Ecosystem node glyphs anchored on the ring (small allies) -->
    <g filter="url(#eco__glowFine)">
      <circle class="pulse" cx="190"  cy="0"   r="3.2" fill="#39E0FF"/>
      <circle class="pulse" cx="-95"  cy="-48" r="3.0" fill="#8B7DFF"/>
      <circle class="pulse" cx="95"   cy="48"  r="3.0" fill="#8B7DFF"/>
      <circle class="pulse" cx="-95"  cy="48"  r="2.8" fill="#39E0FF"/>
      <circle class="pulse" cx="95"   cy="-48" r="2.8" fill="#39E0FF"/>
    </g>
  </g>

  <!-- Section label -->
  <text x="600" y="200" text-anchor="middle"
        font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="12" letter-spacing="6" fill="#7E879F">E C O S Y S T E M   /   T E L E M E T R Y</text>
</svg>
