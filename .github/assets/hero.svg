<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1200 340" width="1200" height="340" role="img"
     aria-labelledby="hero__title hero__desc">
  <title id="hero__title">Luna MCP — AI-native debugger for Luna playable builds</title>
  <desc id="hero__desc">A deep-space control-room banner: twinkling starfield, an orbiting moon with telemetry particles tracing an elliptical orbit, and the title Luna MCP with a cyan-to-violet gradient sweep.</desc>

  <defs>
    <!-- Shared gradients, re-declared locally with exact hexes, namespaced with hero__ -->
    <linearGradient id="hero__skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#05060B"/>
      <stop offset="55%" stop-color="#080A14"/>
      <stop offset="100%" stop-color="#0E1120"/>
    </linearGradient>

    <linearGradient id="hero__accentArc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#39E0FF"/>
      <stop offset="50%" stop-color="#6AB6FF"/>
      <stop offset="100%" stop-color="#8B7DFF"/>
    </linearGradient>

    <!-- Wide travelling version of the accent arc for the animated title sweep -->
    <linearGradient id="hero__titleSweep" x1="0" y1="0" x2="1" y2="0"
                    gradientUnits="userSpaceOnUse" x="0" y="0">
      <stop offset="0.00" stop-color="#39E0FF"/>
      <stop offset="0.25" stop-color="#6AB6FF"/>
      <stop offset="0.50" stop-color="#8B7DFF"/>
      <stop offset="0.75" stop-color="#6AB6FF"/>
      <stop offset="1.00" stop-color="#39E0FF"/>
      <animateTransform attributeName="gradientTransform" type="translate"
                        from="-560 0" to="560 0" dur="6s"
                        calcMode="spline" keyTimes="0;1" keySplines="0.4 0 0.2 1"
                        repeatCount="indefinite"/>
    </linearGradient>

    <radialGradient id="hero__moonBody" cx="38%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#E8ECF6"/>
      <stop offset="42%" stop-color="#A9B6D9"/>
      <stop offset="78%" stop-color="#3A4360"/>
      <stop offset="100%" stop-color="#10131F"/>
    </radialGradient>

    <radialGradient id="hero__moonHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A9B6D9" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#8B7DFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#05060B" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="hero__vignette" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#0E1120" stop-opacity="0"/>
      <stop offset="100%" stop-color="#05060B" stop-opacity="0.9"/>
    </radialGradient>

    <!-- Canonical soft-glow recipe -->
    <filter id="hero__glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hero__glowFine" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hero__glowMoon" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Elliptical orbit path shared by satellites -->
    <path id="hero__orbitPath"
          d="M 940 170 a 250 96 0 1 0 -500 0 a 250 96 0 1 0 500 0" fill="none"/>

    <style>
      .twinkle { animation: hero__tw 2.4s ease-in-out infinite; }
      .twinkle.d1 { animation-delay: 0.3s; }
      .twinkle.d2 { animation-delay: 0.7s; }
      .twinkle.d3 { animation-delay: 1.1s; }
      .twinkle.d4 { animation-delay: 1.5s; }
      .twinkle.d5 { animation-delay: 1.9s; }
      .beacon  { animation: hero__beacon 2.4s ease-in-out infinite; }
      .moonPulse { animation: hero__moonPulse 3s ease-in-out infinite; }
      .drift { animation: hero__drift 40s linear infinite; }

      @keyframes hero__tw {
        0%, 100% { opacity: 0.30; } 50% { opacity: 0.85; }
      }
      @keyframes hero__beacon {
        0%, 100% { opacity: 0.25; } 50% { opacity: 0.70; }
      }
      @keyframes hero__moonPulse {
        0%, 100% { opacity: 0.85; } 50% { opacity: 1; }
      }
      @keyframes hero__drift {
        0% { transform: translateX(0); } 50% { transform: translateX(8px); } 100% { transform: translateX(0); }
      }
      /* Stat chip staggered entrance */
      .hero__chip { opacity: 0; animation: hero__chipIn 0.9s ease-out forwards; }
      .hero__chip.c1 { animation-delay: 1.8s; }
      .hero__chip.c2 { animation-delay: 2.1s; }
      .hero__chip.c3 { animation-delay: 2.4s; }
      @keyframes hero__chipIn {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* Rising particle drift */
      @keyframes hero__rise {
        from { opacity: 0; } 8% { opacity: var(--p); } 85% { opacity: var(--p); } to { opacity: 0; }
      }

      @media (prefers-reduced-motion: reduce) {
        * { animation: none !important; }
      }
    </style>
  </defs>

  <!-- Canvas -->
  <rect x="0" y="0" width="1200" height="340" rx="16" fill="url(#hero__skyGrad)"/>

  <!-- Starfield: ~95 stars, scattered, twinkle via opacity only -->
  <g fill="#F4F7FF">
    <circle class="twinkle d1" cx="38"  cy="44"  r="0.9" opacity="0.5"/>
    <circle class="twinkle d3" cx="71"  cy="262" r="1.1" opacity="0.6"/>
    <circle class="twinkle"    cx="96"  cy="120" r="0.7" opacity="0.4"/>
    <circle class="twinkle d2" cx="120" cy="300" r="1.0" opacity="0.55"/>
    <circle class="twinkle d4" cx="142" cy="70"  r="0.8" opacity="0.45"/>
    <circle class="twinkle d5" cx="168" cy="200" r="1.2" opacity="0.7"/>
    <circle class="twinkle d1" cx="190" cy="38"  r="0.6" opacity="0.35"/>
    <circle class="twinkle d3" cx="214" cy="150" r="0.9" opacity="0.5"/>
    <circle class="twinkle"    cx="236" cy="284" r="1.0" opacity="0.6"/>
    <circle class="twinkle d2" cx="260" cy="96"  r="0.7" opacity="0.45"/>
    <circle class="twinkle d5" cx="284" cy="230" r="1.1" opacity="0.65"/>
    <circle class="twinkle d4" cx="312" cy="56"  r="0.8" opacity="0.4"/>
    <circle class="twinkle d1" cx="334" cy="312" r="0.9" opacity="0.55"/>
    <circle class="twinkle d3" cx="360" cy="180" r="0.6" opacity="0.35"/>
    <circle class="twinkle"    cx="388" cy="108" r="1.0" opacity="0.6"/>
    <circle class="twinkle d2" cx="414" cy="268" r="0.8" opacity="0.5"/>
    <circle class="twinkle d4" cx="440" cy="40"  r="1.1" opacity="0.6"/>
    <circle class="twinkle d5" cx="466" cy="214" r="0.7" opacity="0.4"/>
    <circle class="twinkle d1" cx="492" cy="132" r="0.9" opacity="0.55"/>
    <circle class="twinkle d3" cx="520" cy="296" r="1.0" opacity="0.6"/>
    <circle class="twinkle"    cx="548" cy="62"  r="0.6" opacity="0.35"/>
    <circle class="twinkle d2" cx="576" cy="248" r="0.8" opacity="0.5"/>
    <circle class="twinkle d4" cx="604" cy="100" r="1.1" opacity="0.65"/>
    <circle class="twinkle d5" cx="632" cy="306" r="0.7" opacity="0.4"/>
    <circle class="twinkle d1" cx="660" cy="46"  r="0.9" opacity="0.55"/>
    <circle class="twinkle d3" cx="688" cy="190" r="1.0" opacity="0.6"/>
    <circle class="twinkle"    cx="716" cy="280" r="0.6" opacity="0.35"/>
    <circle class="twinkle d2" cx="744" cy="84"  r="0.8" opacity="0.5"/>
    <circle class="twinkle d4" cx="772" cy="234" r="1.1" opacity="0.6"/>
    <circle class="twinkle d5" cx="800" cy="52"  r="0.7" opacity="0.4"/>
    <circle class="twinkle d1" cx="828" cy="160" r="0.9" opacity="0.55"/>
    <circle class="twinkle d3" cx="856" cy="300" r="1.0" opacity="0.6"/>
    <circle class="twinkle"    cx="884" cy="74"  r="0.6" opacity="0.35"/>
    <circle class="twinkle d2" cx="912" cy="220" r="0.8" opacity="0.5"/>
    <circle class="twinkle d4" cx="940" cy="44"  r="1.1" opacity="0.6"/>
    <circle class="twinkle d5" cx="968" cy="288" r="0.7" opacity="0.4"/>
    <circle class="twinkle d1" cx="996" cy="118" r="0.9" opacity="0.55"/>
    <circle class="twinkle d3" cx="1022" cy="250" r="1.0" opacity="0.6"/>
    <circle class="twinkle"    cx="1048" cy="60"  r="0.6" opacity="0.35"/>
    <circle class="twinkle d2" cx="1074" cy="196" r="0.8" opacity="0.5"/>
    <circle class="twinkle d4" cx="1100" cy="308" r="1.1" opacity="0.6"/>
    <circle class="twinkle d5" cx="1124" cy="86"  r="0.7" opacity="0.4"/>
    <circle class="twinkle d1" cx="1150" cy="240" r="0.9" opacity="0.55"/>
    <circle class="twinkle d3" cx="1172" cy="130" r="1.0" opacity="0.6"/>
    <circle class="twinkle"    cx="26"  cy="186" r="0.7" opacity="0.4"/>
    <circle class="twinkle d2" cx="54"  cy="96"  r="0.9" opacity="0.5"/>
    <circle class="twinkle d4" cx="108" cy="226" r="0.8" opacity="0.45"/>
